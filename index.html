<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bernardo.sec</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0f14;
      --card: #111927;
      --border: #1f2937;
      --text: #d1d5db;
      --muted: #7c8594;
      --accent: #00ff9c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;

      max-width: 1200px;
      margin: auto;

      padding: 50px 24px;
    }

    header {
      margin-bottom: 60px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    h1 {
      color: var(--accent);
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
    }

    .terminal-line {
      margin-top: 14px;
      color: var(--accent);
      font-family: monospace;
      opacity: 0.8;
    }

    .section-title {
      margin-bottom: 30px;
      font-size: 1.4rem;
      color: white;
    }

    .posts-grid {
      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

      gap: 22px;
    }

    .post-card {
      background: linear-gradient(
        180deg,
        rgba(17, 25, 39, 0.95),
        rgba(10, 15, 20, 0.98)
      );

      border: 1px solid var(--border);

      border-radius: 16px;

      padding: 24px;

      transition: all 0.25s ease;

      position: relative;
      overflow: hidden;

      min-height: 220px;
    }

    .post-card::before {
      content: "";

      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 3px;

      background: var(--accent);
    }

    .post-card:hover {
      transform: translateY(-5px);

      border-color: rgba(0,255,156,0.3);

      box-shadow:
        0 0 25px rgba(0,255,156,0.08),
        0 0 2px rgba(0,255,156,0.25);
    }

    .post-card a {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
    }

    .post-date {
      color: var(--accent);

      font-family: monospace;
      font-size: 0.85rem;

      margin-bottom: 18px;
    }

    .post-title {
      color: white;

      font-size: 1.35rem;
      font-weight: bold;

      margin-bottom: 16px;

      line-height: 1.4;
    }

    .post-description {
      color: #b6c2cf;

      line-height: 1.8;
      font-size: 0.96rem;
    }

    .tag {
      display: inline-block;

      margin-top: 22px;

      padding: 6px 10px;

      border-radius: 999px;

      border: 1px solid rgba(0,255,156,0.15);

      background: rgba(0,255,156,0.05);

      color: var(--accent);

      font-size: 0.78rem;
      font-family: monospace;
    }

    footer {
      margin-top: 70px;

      padding-top: 25px;

      border-top: 1px solid var(--border);

      text-align: center;

      color: var(--muted);

      font-size: 0.9rem;
    }

  </style>
</head>

<body>

  <header>

    <h1>Bernardo.sec</h1>

    <p class="subtitle">
      Thoughts, notes and research on cybersecurity.
    </p>

    <div class="terminal-line">
      root@bernardo:~# ls posts/
    </div>

  </header>

  <main>

    <h2 class="section-title">
      Latest Posts
    </h2>

    <div class="posts-grid">


      <article class="post-card">

        <a href="posts/2026-05-13-about-this-blog.html">

          <div class="post-date">
            [ 2026-05-13 ]
          </div>

          <div class="post-title">
            About This Blog
          </div>

          <div class="post-description">
            Security notes from the trenches. Offense, defense, and everything in between.
          </div>

          <div class="tag">
            information
          </div>

        </a>

      </article>

    </div>

  </main>

  <footer>
    © 2026 Bernardo.sec
  </footer>

</body>
</html>
